<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mundial 2026">
<meta name="theme-color" content="#0F6E56">
<title>Mundial 2026</title>
<style>
:root {
  --green:#1D9E75; --green-dark:#0F6E56; --green-light:#EAF3DE;
  --amber:#BA7517; --amber-light:#FAEEDA;
  --blue-light:#E6F1FB; --blue:#185FA5;
  --purple-light:#EEEDFE; --purple:#534AB7;
  --red:#A32D2D;
  --bg:#f2f1ec; --card:#ffffff; --border:#e0ddd6;
  --text:#1a1a1a; --muted:#777;
  --nav-h:64px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);}
.shell{display:flex;flex-direction:column;height:100%;}
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px 12px calc(var(--nav-h) + 16px);}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;height:var(--nav-h);background:white;border-top:1px solid var(--border);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom);}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border:none;background:none;color:var(--muted);font-size:10px;cursor:pointer;padding:6px 2px;}
.nav-item.active{color:var(--green);}
.nav-icon{font-size:20px;line-height:1;}
.section{display:none;}
.section.active{display:block;}
.countdown{background:var(--green-dark);border-radius:16px;padding:16px;margin-bottom:14px;color:white;}
.cd-label{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.06em;opacity:.75;margin-bottom:6px;}
.cd-title{font-size:18px;font-weight:700;margin-bottom:2px;}
.cd-sub{font-size:12px;opacity:.65;margin-bottom:12px;}
.cd-boxes{display:flex;gap:8px;}
.cd-box{flex:1;background:rgba(255,255,255,.15);border-radius:10px;padding:10px 4px;text-align:center;}
.cd-num{font-size:28px;font-weight:700;line-height:1;}
.cd-unit{font-size:9px;opacity:.7;text-transform:uppercase;letter-spacing:.05em;margin-top:2px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:10px;}
.card-title{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:12px;}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;}
.stat{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 8px;text-align:center;}
.stat-label{font-size:11px;color:var(--muted);margin-bottom:4px;line-height:1.3;}
.stat-val{font-size:20px;font-weight:700;}
.badge{display:inline-block;font-size:11px;padding:3px 8px;border-radius:20px;font-weight:600;white-space:nowrap;}
.b-vac{background:var(--blue-light);color:var(--blue);}
.b-work{background:#FAECE7;color:#993C1D;}
.b-holiday{background:var(--green-light);color:var(--green-dark);}
.b-ok{background:var(--green-light);color:#3B6D11;}
.b-wip{background:var(--amber-light);color:var(--amber);}
.day-row{display:grid;grid-template-columns:68px 1fr auto;gap:8px;align-items:start;padding:10px 0;border-bottom:1px solid #f0ede8;}
.day-row:last-child{border-bottom:none;}
.day-date{font-size:12px;color:var(--muted);padding-top:2px;}
.day-city{font-size:14px;font-weight:600;}
.day-note{font-size:12px;color:var(--muted);margin-top:2px;}
.day-badges;display:flex;flex-direction:column;gap:3px;align-items:flex-end;}
.ticket{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:10px;}
.ticket-wip{border-color:#EF9F27;}
.ticket-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
.ticket-name{font-size:15px;font-weight:700;}
.ticket-name-wip{color:var(--amber);}
.ticket-info{font-size:12px;color:var(--muted);margin-top:3px;}
.ticket-price{font-size:17px;font-weight:700;color:var(--green);white-space:nowrap;text-align:right;}
.wip-label{font-size:12px;font-weight:600;color:var(--amber);text-transform:uppercase;letter-spacing:.04em;margin:14px 0 6px;}
.aloj{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:10px;}
.aloj-top{display:flex;justify-content:space-between;align-items:flex-start;}
.aloj-city{font-size:16px;font-weight:700;}
.aloj-dates{font-size:12px;color:var(--muted);margin-top:2px;}
.aloj-price{font-size:17px;font-weight:700;color:var(--green);}
.aloj-price-r{font-size:15px;font-weight:700;color:var(--amber);}
.aloj-sub{font-size:11px;color:var(--muted);text-align:right;margin-top:2px;}
.aloj-link{display:inline-flex;align-items:center;gap:4px;margin-top:10px;font-size:13px;color:var(--green);text-decoration:none;border:1px solid var(--green);border-radius:8px;padding:7px 14px;font-weight:500;}
.aloj-nolink{display:inline-flex;align-items:center;margin-top:10px;font-size:12px;color:var(--muted);border:1px dashed var(--border);border-radius:8px;padding:6px 12px;}
.check-item{display:flex;align-items:flex-start;gap:10px;padding:11px 0;border-bottom:1px solid #f0ede8;font-size:14px;}
.check-item:last-child{border-bottom:none;}
.cdot{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:1px;}
.cdot-ok{background:var(--green-light);color:#3B6D11;}
.cdot-todo{background:var(--amber-light);color:var(--amber);border:1.5px dashed #EF9F27;}
.stbl{width:100%;border-collapse:collapse;font-size:13px;}
.stbl th{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;padding:6px 4px;border-bottom:1px solid var(--border);text-align:right;font-weight:500;}
.stbl th:first-child{text-align:left;}
.stbl td{padding:9px 4px;border-bottom:1px solid #f0ede8;vertical-align:middle;}
.stbl tr:last-child td{border-bottom:none;}
.tr{text-align:right;}
.eform{background:#f7f6f1;border-radius:12px;padding:14px;margin-bottom:12px;}
.eform-ttl{font-size:13px;font-weight:500;color:var(--muted);margin-bottom:10px;}
.eform input,.eform select{width:100%;font-size:15px;padding:11px 12px;border:1px solid var(--border);border-radius:10px;background:white;color:var(--text);margin-bottom:8px;-webkit-appearance:none;appearance:none;}
.echips{display:flex;gap:8px;margin-bottom:10px;}
.wchip{font-size:13px;padding:6px 14px;border-radius:20px;font-weight:500;cursor:pointer;border:1.5px solid transparent;opacity:.4;transition:opacity .15s;}
.wchip.on{opacity:1;}
.cv{background:var(--purple-light);color:var(--purple);border-color:var(--purple);}
.ci{background:var(--green-light);color:var(--green-dark);border-color:var(--green-dark);}
.ce{background:var(--amber-light);color:var(--amber);border-color:var(--amber);}
.btn-add{width:100%;background:var(--green);color:white;border:none;border-radius:10px;padding:13px;font-size:16px;font-weight:700;cursor:pointer;}
.btn-add:active{background:var(--green-dark);}
.erow{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:start;padding:10px 0;border-bottom:1px solid #f0ede8;}
.erow:last-child{border-bottom:none;}
.edesc{font-size:14px;font-weight:600;}
.emeta{font-size:12px;color:var(--muted);margin-top:2px;}
.etotal{font-size:15px;font-weight:700;}
.bdel{background:none;border:none;color:#ccc;font-size:17px;cursor:pointer;padding:0 2px;}
.brow{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid #f0ede8;}
.brow:last-child{border-bottom:none;}
.bperson{display:flex;align-items:center;gap:10px;}
.av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;}
.av-v{background:var(--purple-light);color:var(--purple);}
.av-i{background:var(--green-light);color:var(--green-dark);}
.av-e{background:var(--amber-light);color:var(--amber);}
.bname{font-size:15px;font-weight:600;}
.bamount{font-size:17px;font-weight:700;}
.bpos{color:var(--green);}
.bneg{color:var(--red);}
.bzero{color:var(--muted);}
.blabel{font-size:11px;color:var(--muted);text-align:right;margin-top:2px;}
.sbox{margin-top:12px;padding-top:12px;border-top:1px solid var(--border);}
.stitle{font-size:11px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px;}
.sitem{font-size:14px;padding:4px 0;line-height:1.5;}
.sub-title{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin:16px 0 8px;}
.page-header{margin-bottom:14px;}
.page-title{font-size:22px;font-weight:800;}
.page-sub{font-size:13px;color:var(--muted);margin-top:2px;}
</style>
</head>
